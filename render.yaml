services:
  - type: web
    name: daas-data-as-a-service
    runtime: docker
    plan: free
    region: singapore
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: DATABASE_URL
        sync: false
      - key: SESSION_SECRET
        sync: false
